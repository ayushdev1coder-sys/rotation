<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Motion 3D Controller</title>

    <link rel="stylesheet" href="style.css">

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
</head>

<body>

<header>
    <h1>📱 Phone Motion 3D Controller</h1>
    <p>Control the 3D object using your phone.</p>
</header>

<div class="toolbar">

    <button id="bluetoothBtn">
        🔵 Connect Bluetooth
    </button>

    <button id="motionBtn">
        📱 Enable Motion
    </button>

    <button id="fullscreenBtn">
        ⛶ Full Screen
    </button>

    <input
        type="file"
        id="modelInput"
        accept=".glb,.gltf"
    >

</div>

<div class="status">

    <h2>Status</h2>

    Bluetooth:
    <span id="btStatus">Disconnected</span>

    <br><br>

    Motion:
    <span id="motionStatus">Disabled</span>

</div>

<div class="sensorBox">

    <h2>Sensor Data</h2>

    Alpha:
    <span id="alpha">0</span><br>

    Beta:
    <span id="beta">0</span><br>

    Gamma:
    <span id="gamma">0</span><br>

</div>

<!-- 3D Scene -->
<div id="viewer"></div>

<script src="bluetooth.js"></script>
<script src="motion.js"></script>
<script src="model.js"></script>
<script src="script.js"></script>

</body>
</html>
